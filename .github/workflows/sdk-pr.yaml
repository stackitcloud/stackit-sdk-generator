name: Update SDK Repo Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GO_VERSION: "1.25"
  JAVA_VERSION: "25"

jobs:
  main-go:
    name: "[Go] Update SDK Repo"
    runs-on: ubuntu-latest
    permissions: 
      pull-requests: write
      contents: write
    steps:
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ vars.SSH_KNOWN_HOSTS }}
      
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
    
      - name: Install project tools and dependencies
        shell: bash
        run: make project-tools
        
      - name: Download OAS
        shell: bash
        run: make download-oas
      
      - name: Generate SDK
        shell: bash
        run: make generate-sdk
      
      - name: Push SDK
        env:
          GH_REPO: "stackitcloud/stackit-sdk-go"
          GH_TOKEN: ${{ secrets.SDK_PR_TOKEN }}
        run: |
          scripts/sdk-create-pr.sh "generator-bot-${{ github.run_id }}" "Generated from GitHub run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
  
  main-python:
    name: "[Python] Update SDK Repo"
    runs-on: ubuntu-latest
    permissions: 
      pull-requests: write
      contents: write
    steps:
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ vars.SSH_KNOWN_HOSTS }}
      
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install project tools and dependencies
        shell: bash
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          make project-tools LANGUAGE=python
      
      - name: install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.4"
      
      - name: Download OAS
        shell: bash
        run: make download-oas
      
      - name: Generate SDK
        shell: bash
        run: make generate-sdk LANGUAGE=python
      
      - name: Push SDK
        env:
          GH_REPO: "stackitcloud/stackit-sdk-python"
          GH_TOKEN: ${{ secrets.SDK_PR_TOKEN }}
        run: |
          (cd ./sdk-repo-updated && make install-dev)
          scripts/sdk-create-pr.sh "generator-bot-${{ github.run_id }}" "Generated from GitHub run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" "git@github.com:stackitcloud/stackit-sdk-python.git" "python"

  main-java:
    name: "[Java] Update SDK Repo"
    runs-on: ubuntu-latest
    permissions: 
      pull-requests: write
      contents: write
    steps:
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ vars.SSH_KNOWN_HOSTS }}
      
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Download OAS
        run: make download-oas
      
      - name: Generate SDK
        run: make generate-sdk
        env:
          LANGUAGE: java
      
      - name: Push SDK
        env:
          GH_REPO: "stackitcloud/stackit-sdk-java"
          GH_TOKEN: ${{ secrets.SDK_PR_TOKEN }}
        run: |
          scripts/sdk-create-pr.sh "generator-bot-${{ github.run_id }}" "Generated from GitHub run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" "git@github.com:stackitcloud/stackit-sdk-java.git" "java"
