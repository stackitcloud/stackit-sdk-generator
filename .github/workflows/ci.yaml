name: CI Workflow

on: [pull_request, workflow_dispatch]

env:
  GO_VERSION_BUILD: "1.25"
  JAVA_VERSION: "11"

jobs:
  main-go:
    name: CI [Go]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.21", "1.22", "1.23"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      
      - name: Install project tools and dependencies
        shell: bash
        run: make project-tools
      
      - name: Download OAS
        shell: bash
        run: make download-oas
      
      - name: Generate SDK
        shell: bash
        run: make generate-go-sdk
      
      - name: Test
        working-directory: ./sdk-repo-updated
        run: make test skip-non-generated-files=true

  lint-go:
    name: CI [Go]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION_BUILD }}
      
      - name: Install project tools and dependencies
        shell: bash
        run: make project-tools
      
      - name: Download OAS
        shell: bash
        run: make download-oas
      
      - name: Generate SDK
        shell: bash
        run: make generate-go-sdk
      
      - name: Remove waiters
        working-directory: ./sdk-repo-updated
        run: rm -r services/*/wait
      
      - name: Install SDK project tools and dependencies 
        working-directory: ./sdk-repo-updated
        run: make project-tools
      
      - name: Lint
        working-directory: ./sdk-repo-updated
        run: make lint skip-non-generated-files=true

  main-python:
    name: CI [Python]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.4"
      
      - name: Install project tools and dependencies
        shell: bash
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          make project-tools LANGUAGE=python
      
      - name: Download OAS
        shell: bash
        run: make download-oas
      
      - name: Generate SDK
        shell: bash
        run: make generate-python-sdk
      
      - name: install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.4"
          python-version: ${{ matrix.python-version }}
      
      - name: Install SDK
        working-directory: ./sdk-repo-updated
        run: make install-dev
      
      - name: Lint
        working-directory: ./sdk-repo-updated
        run: make lint
      
      - name: Test
        working-directory: ./sdk-repo-updated
        run: make test

  main-java:
    name: CI [Java]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ["17", "21", "25"]
    steps:
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ matrix.java-version }}
      
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Download OAS
        run: make download-oas
      
      - name: Generate SDK
        run: make generate-java-sdk
     
      - name: Lint
        working-directory: ./sdk-repo-updated
        run: make lint
      
      - name: Test
        working-directory: ./sdk-repo-updated
        run: make test
